site_name: LoonAI Gateway Documentation
site_description: University of Minnesota AI Gateway documentation
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/umn.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Keys and Access: using-api-keys.md
  - Models, Pricing, and Limits: models-and-costs.md
  - Coding Tools Integration: coding-tools.md
  - Support and Roadmap: support-and-roadmap.md
